name: Deploy Bicep Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep modules
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-cloud-portfolio \
              --template-file Projects/azure-cloud-engineering/infrastructure-as-code-and-cloud-governance/bicep/main.bicep \
              --parameters Projects/azure-cloud-engineering/infrastructure-as-code-and-cloud-governance/bicep/parameters.json
